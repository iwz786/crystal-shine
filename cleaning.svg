<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
    <defs>
        <!-- 3D Crystal Diamond Gradient -->
        <linearGradient id="crystalMain" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
            <stop offset="25%" style="stop-color:#7EC8E3;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#3BA7D9;stop-opacity:1" />
            <stop offset="75%" style="stop-color:#2196C9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0D7AB5;stop-opacity:1" />
        </linearGradient>

        <!-- Crystal highlight gradient (top face) -->
        <linearGradient id="crystalTop" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
            <stop offset="40%" style="stop-color:#D4EFFC;stop-opacity:0.7" />
            <stop offset="100%" style="stop-color:#7EC8E3;stop-opacity:0.4" />
        </linearGradient>

        <!-- Crystal dark face gradient -->
        <linearGradient id="crystalDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1A8DBE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0A5F8A;stop-opacity:1" />
        </linearGradient>

        <!-- Crystal right face -->
        <linearGradient id="crystalRight" x1="0%" y1="0%" x2="100%" y2="80%">
            <stop offset="0%" style="stop-color:#4DB8DE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1580AA;stop-opacity:1" />
        </linearGradient>

        <!-- Crystal left face -->
        <linearGradient id="crystalLeft" x1="100%" y1="0%" x2="0%" y2="80%">
            <stop offset="0%" style="stop-color:#8DD4EE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2A9AC5;stop-opacity:1" />
        </linearGradient>

        <!-- Gloss overlay -->
        <linearGradient id="glossOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
            <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
            <stop offset="51%" style="stop-color:#000000;stop-opacity:0.0" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
        </linearGradient>

        <!-- Water droplet gradient -->
        <radialGradient id="dropletGrad" cx="40%" cy="35%" r="50%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
            <stop offset="50%" style="stop-color:#B8E2F4;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#3BA7D9;stop-opacity:0.9" />
        </radialGradient>

        <!-- Sparkle gradient -->
        <radialGradient id="sparkleGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
            <stop offset="60%" style="stop-color:#D4EFFC;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#7EC8E3;stop-opacity:0" />
        </radialGradient>

        <!-- Shadow filter -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0A5F8A" flood-opacity="0.3" />
        </filter>

        <!-- Glow filter for sparkles -->
        <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Soft glow for icon -->
        <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feFlood flood-color="#3BA7D9" flood-opacity="0.2" result="color" />
            <feComposite in="color" in2="blur" operator="in" result="shadow" />
            <feMerge>
                <feMergeNode in="shadow" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Text gradient -->
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1A8DBE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0A5F8A;stop-opacity:1" />
        </linearGradient>

        <!-- Silver gradient for tagline -->
        <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8899AA;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#6B7D8D;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#5A6B7A;stop-opacity:1" />
        </linearGradient>

        <!-- Inner shine for crystal -->
        <linearGradient id="innerShine" x1="30%" y1="0%" x2="70%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
        </linearGradient>
    </defs>

    <!-- ==================== ICON GROUP ==================== -->
    <g transform="translate(60, 30)" filter="url(#iconGlow)">

        <!-- Diamond / Crystal Shape - 3D Multi-faceted -->
        <!-- Shadow base -->
        <ellipse cx="105" cy="235" rx="50" ry="8" fill="#0A5F8A" opacity="0.15" />

        <!-- Bottom point (back face) -->
        <polygon points="105,230 55,100 155,100"
            fill="url(#crystalDark)" filter="url(#dropShadow)" />

        <!-- Left face of diamond -->
        <polygon points="105,230 55,100 105,85"
            fill="url(#crystalLeft)" opacity="0.95" />

        <!-- Right face of diamond -->
        <polygon points="105,230 155,100 105,85"
            fill="url(#crystalRight)" opacity="0.95" />

        <!-- Top crown - left facet -->
        <polygon points="55,100 105,85 80,45"
            fill="url(#crystalLeft)" opacity="0.9" />

        <!-- Top crown - center-left facet -->
        <polygon points="80,45 105,85 105,35"
            fill="#8DD4EE" opacity="0.85" />

        <!-- Top crown - center-right facet -->
        <polygon points="105,35 105,85 130,45"
            fill="#5CBEE0" opacity="0.85" />

        <!-- Top crown - right facet -->
        <polygon points="130,45 105,85 155,100"
            fill="url(#crystalRight)" opacity="0.9" />

        <!-- Top crown - top left -->
        <polygon points="80,45 105,35 65,35"
            fill="#B8E2F4" opacity="0.9" />

        <!-- Top crown - top right -->
        <polygon points="105,35 130,45 145,35"
            fill="#7EC8E3" opacity="0.9" />

        <!-- Top edge bar -->
        <polygon points="65,35 145,35 155,100 55,100"
            fill="none" stroke="url(#crystalMain)" stroke-width="0.5" opacity="0.3" />

        <!-- Crown top surface -->
        <polygon points="65,35 80,45 105,35 130,45 145,35"
            fill="url(#crystalTop)" opacity="0.7" />

        <!-- Gloss highlight on upper left face -->
        <polygon points="70,55 95,80 80,100 58,95"
            fill="url(#innerShine)" opacity="0.6" />

        <!-- Edge highlights -->
        <line x1="105" y1="35" x2="105" y2="85" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5" />
        <line x1="105" y1="85" x2="105" y2="230" stroke="#FFFFFF" stroke-width="0.5" opacity="0.25" />
        <line x1="55" y1="100" x2="155" y2="100" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35" />
        <line x1="65" y1="35" x2="55" y2="100" stroke="#FFFFFF" stroke-width="0.6" opacity="0.4" />
        <line x1="145" y1="35" x2="155" y2="100" stroke="#FFFFFF" stroke-width="0.6" opacity="0.3" />

        <!-- Water droplets around crystal -->
        <!-- Droplet 1 - right side -->
        <g transform="translate(165, 120)">
            <ellipse cx="0" cy="0" rx="8" ry="10" fill="url(#dropletGrad)" filter="url(#dropShadow)" />
            <ellipse cx="-2" cy="-3" rx="3" ry="4" fill="#FFFFFF" opacity="0.7" />
        </g>

        <!-- Droplet 2 - right lower -->
        <g transform="translate(150, 160)">
            <ellipse cx="0" cy="0" rx="5" ry="7" fill="url(#dropletGrad)" filter="url(#dropShadow)" />
            <ellipse cx="-1.5" cy="-2" rx="2" ry="2.5" fill="#FFFFFF" opacity="0.6" />
        </g>

        <!-- Droplet 3 - left side -->
        <g transform="translate(38, 130)">
            <ellipse cx="0" cy="0" rx="6" ry="8" fill="url(#dropletGrad)" filter="url(#dropShadow)" />
            <ellipse cx="-2" cy="-2.5" rx="2.5" ry="3" fill="#FFFFFF" opacity="0.65" />
        </g>

        <!-- ===== SPARKLES / TWINKLES ===== -->
        <!-- Sparkle 1 - top right -->
        <g transform="translate(160, 30)" filter="url(#sparkleGlow)">
            <line x1="-12" y1="0" x2="12" y2="0" stroke="#FFFFFF" stroke-width="2"
                stroke-linecap="round" />
            <line x1="0" y1="-12" x2="0" y2="12" stroke="#FFFFFF" stroke-width="2"
                stroke-linecap="round" />
            <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FFFFFF" stroke-width="1.2"
                stroke-linecap="round" />
            <line x1="7" y1="-7" x2="-7" y2="7" stroke="#FFFFFF" stroke-width="1.2"
                stroke-linecap="round" />
            <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.9" />
        </g>

        <!-- Sparkle 2 - top left -->
        <g transform="translate(35, 18)" filter="url(#sparkleGlow)">
            <line x1="-8" y1="0" x2="8" y2="0" stroke="#D4EFFC" stroke-width="1.5"
                stroke-linecap="round" />
            <line x1="0" y1="-8" x2="0" y2="8" stroke="#D4EFFC" stroke-width="1.5"
                stroke-linecap="round" />
            <line x1="-5" y1="-5" x2="5" y2="5" stroke="#D4EFFC" stroke-width="1"
                stroke-linecap="round" />
            <line x1="5" y1="-5" x2="-5" y2="5" stroke="#D4EFFC" stroke-width="1"
                stroke-linecap="round" />
            <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.8" />
        </g>

        <!-- Sparkle 3 - right mid -->
        <g transform="translate(185, 80)" filter="url(#sparkleGlow)">
            <line x1="-6" y1="0" x2="6" y2="0" stroke="#FFFFFF" stroke-width="1.5"
                stroke-linecap="round" />
            <line x1="0" y1="-6" x2="0" y2="6" stroke="#FFFFFF" stroke-width="1.5"
                stroke-linecap="round" />
            <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.85" />
        </g>

        <!-- Sparkle 4 - small, left -->
        <g transform="translate(20, 70)" filter="url(#sparkleGlow)">
            <line x1="-5" y1="0" x2="5" y2="0" stroke="#B8E2F4" stroke-width="1.2"
                stroke-linecap="round" />
            <line x1="0" y1="-5" x2="0" y2="5" stroke="#B8E2F4" stroke-width="1.2"
                stroke-linecap="round" />
            <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" opacity="0.7" />
        </g>

        <!-- Sparkle 5 - bottom right small -->
        <g transform="translate(170, 190)" filter="url(#sparkleGlow)">
            <line x1="-4" y1="0" x2="4" y2="0" stroke="#D4EFFC" stroke-width="1"
                stroke-linecap="round" />
            <line x1="0" y1="-4" x2="0" y2="4" stroke="#D4EFFC" stroke-width="1"
                stroke-linecap="round" />
            <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" opacity="0.75" />
        </g>

        <!-- Sparkle 6 - tiny accent -->
        <g transform="translate(15, 160)" filter="url(#sparkleGlow)">
            <circle cx="0" cy="0" r="2.5" fill="#FFFFFF" opacity="0.6" />
        </g>

        <!-- Small floating dots (cleanliness particles) -->
        <circle cx="180" cy="55" r="1.5" fill="#7EC8E3" opacity="0.6" />
        <circle cx="25" cy="45" r="1" fill="#B8E2F4" opacity="0.5" />
        <circle cx="190" cy="140" r="1.2" fill="#7EC8E3" opacity="0.5" />

    </g>

    <!-- ==================== TYPOGRAPHY ==================== -->
    <g transform="translate(290, 80)">
        <!-- "Crystal Shine" - main text -->
        <text x="0" y="50"
            font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
            font-size="62" font-weight="700" fill="url(#textGradient)"
            letter-spacing="2">
            Crystal Shine
        </text>

        <!-- Subtle text shadow for 3D feel -->
        <text x="1.5" y="51.5"
            font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
            font-size="62" font-weight="700" fill="#0A5F8A" opacity="0.08"
            letter-spacing="2">
            Crystal Shine
        </text>

        <!-- Thin accent line -->
        <line x1="0" y1="68" x2="460" y2="68" stroke="url(#crystalMain)" stroke-width="1.5"
            opacity="0.4" />

        <!-- "Cleaning Services" - tagline -->
        <text x="2" y="100"
            font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
            font-size="26" font-weight="400" fill="url(#silverGrad)"
            letter-spacing="8">
            CLEANING SERVICES
        </text>
    </g>

    <!-- Decorative sparkle near text -->
    <g transform="translate(720, 85)" filter="url(#sparkleGlow)">
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#7EC8E3" stroke-width="1.2"
            stroke-linecap="round" />
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#7EC8E3" stroke-width="1.2"
            stroke-linecap="round" />
        <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" opacity="0.7" />
    </g>

</svg>